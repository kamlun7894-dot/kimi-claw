        .container {

            margin: 0 auto;
            padding: 40px 20px;

        h1 {

            color: var(--text-secondary);

        .intro {

        }

            border-radius: 12px;
            padding: 24px;

            border: 1px solid var(--border);
            border-left: 3px solid;
        }
        .failure.minor { border-left-color: #f59e0b; }
        .failure.painful { border-left-color: #f97316; }
        .failure.disaster { border-left-color: #ef4444; }
        .fail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;

        .fail-title {

        .severity.minor { background: #f59e0b; color: var(--bg-primary); }

            font-size: 0.85em;
            text-transform: uppercase;
